name: Build installers

# Builds Windows (.exe) and macOS (.dmg) installers. Pushing a version tag
# (e.g. v1.0.0) also publishes them to a GitHub Release. You can also run it
# manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }} installer
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (optional) ---
          # To sign, add CSC_LINK + CSC_KEY_PASSWORD repository secrets (see
          # docs/SIGNING.md) and uncomment the two lines below. Leaving them
          # commented keeps unsigned builds working; an EMPTY CSC_LINK would
          # fail the build, so only enable once the secrets actually exist.
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: switchboard-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
